name: CoreBuild CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run type-check

      - name: Unit tests (relevance, dimensions, build-analysis, generate)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # next build importeert de auth-route, die bij module-load een
          # DATABASE_URL eist (auth.ts gooit anders). getDb() maakt met deze
          # placeholder een lazy pg-Pool (localhost → geen TLS, geen connectie
          # tijdens de build). Productiebuilds op Vercel krijgen de echte waarde.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-at-runtime
